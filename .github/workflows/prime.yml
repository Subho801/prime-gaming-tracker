name: Prime Gaming Tracker

on:
  workflow_dispatch:
  schedule:
    - cron: "0 */6 * * *"

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install packages
        run: pip install -r requirements.txt

      - name: Install Playwright Chromium
        run: python -m playwright install chromium

      - name: Run Prime tracker
        run: python scripts/prime.py

      - name: Upload debug screenshot
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: prime-debug
          path: prime-debug.png

      - name: Commit JSON
        run: |
          git config user.name "actions-user"
          git config user.email "actions@github.com"
          git add data/prime-gaming.json
          git diff --cached --quiet || git commit -m "Update Prime Gaming games"
          git push
